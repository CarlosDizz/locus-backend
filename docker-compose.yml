services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_DRIVER: ${DB_DRIVER:-mysql+pymysql}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-locus}
      DB_USER: ${DB_USER:-locus}
      DB_PASSWORD: ${DB_PASSWORD:-locus}
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://locus:locus@mysql:3306/locus}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./main.py:/app/main.py

  mysql:
    image: mysql:8.4
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-locus}
      MYSQL_USER: ${MYSQL_USER:-locus}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-locus}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mysql_data:
